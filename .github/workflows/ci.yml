name: CI

on:
  pull_request:
    branches:
      - main

jobs:
  quality-gate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Frontend tests
        run: npm run test:frontend

      - name: Frontend coverage
        run: npm run test:frontend:coverage

      - name: Backend coverage
        run: npm run test:backend:coverage

      - name: Build frontend and platform dashboard
        run: npm run build

      - name: Build backend
        run: npm run build:backend

      - name: Smoke test public surfaces
        run: |
          set -euo pipefail

          npm run start > /tmp/getprio-backend.log 2>&1 &
          backend_pid=$!
          npm --workspace frontend run preview -- --host 127.0.0.1 --port 5173 > /tmp/getprio-frontend.log 2>&1 &
          frontend_pid=$!
          npm --workspace platform-dashboard run preview -- --host 127.0.0.1 --port 7100 > /tmp/getprio-platform.log 2>&1 &
          platform_pid=$!

          cleanup() {
            kill $backend_pid $frontend_pid $platform_pid >/dev/null 2>&1 || true
          }
          trap cleanup EXIT

          for url in \
            http://127.0.0.1:5001/api/health \
            http://127.0.0.1:5173/ \
            http://127.0.0.1:7100/
          do
            for attempt in $(seq 1 30); do
              if curl -fsS "$url" >/dev/null; then
                break
              fi
              if [ "$attempt" -eq 30 ]; then
                echo "Timed out waiting for $url"
                exit 1
              fi
              sleep 2
            done
          done

          SMOKE_STAGE=public npm run smoke

  pr-summary:
    needs: quality-gate
    if: ${{ github.event_name == 'pull_request' }}
    runs-on: ubuntu-latest

    permissions:
      pull-requests: write

    steps:
      - name: Comment PR summary
        uses: actions/github-script@v7
        with:
          script: |
            const conclusion = "${{ needs.quality-gate.result }}";
            const summary =
              conclusion === "success"
                ? "CI passed: lint, typecheck, frontend coverage, backend coverage, builds, and public smoke checks succeeded."
                : `CI ${conclusion}: one or more quality checks failed.`;

            const marker = "<!-- getprio-ci-summary -->";
            const body = `${marker}\n${summary}`;
            const { owner, repo } = context.repo;
            const issue_number = context.payload.pull_request.number;

            const comments = await github.paginate(github.rest.issues.listComments, {
              owner,
              repo,
              issue_number
            });

            const existing = comments.find((comment) =>
              comment.body && comment.body.includes(marker)
            );

            if (existing) {
              await github.rest.issues.updateComment({
                owner,
                repo,
                comment_id: existing.id,
                body
              });
            } else {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number,
                body
              });
            }
