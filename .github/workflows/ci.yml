name: CI

on:
  pull_request:
    branches:
      - main

jobs:
  quality-gate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Frontend tests
        run: npm run test:frontend

      - name: Frontend coverage
        run: npm run test:frontend:coverage

      - name: Backend coverage
        run: npm run test:backend:coverage

      - name: Build frontend and platform dashboard
        run: npm run build

      - name: Build backend
        run: npm run build:backend

  pr-summary:
    needs: quality-gate
    if: ${{ github.event_name == 'pull_request' }}
    runs-on: ubuntu-latest

    permissions:
      pull-requests: write

    steps:
      - name: Comment PR summary
        uses: actions/github-script@v7
        with:
          script: |
            const conclusion = "${{ needs.quality-gate.result }}";
            const summary =
              conclusion === "success"
                ? "CI passed: lint, typecheck, frontend coverage, backend coverage, and builds succeeded."
                : `CI ${conclusion}: one or more quality checks failed.`;

            const marker = "<!-- getprio-ci-summary -->";
            const body = `${marker}\n${summary}`;
            const { owner, repo } = context.repo;
            const issue_number = context.payload.pull_request.number;

            const comments = await github.paginate(github.rest.issues.listComments, {
              owner,
              repo,
              issue_number
            });

            const existing = comments.find((comment) =>
              comment.body && comment.body.includes(marker)
            );

            if (existing) {
              await github.rest.issues.updateComment({
                owner,
                repo,
                comment_id: existing.id,
                body
              });
            } else {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number,
                body
              });
            }
